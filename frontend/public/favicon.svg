<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7931E" />
      <stop offset="100%" stop-color="#D9531E" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#145A96" />
      <stop offset="100%" stop-color="#0F3863" />
    </linearGradient>
  </defs>

  <!-- Connecting Lines -->
  <path d="M 140 180 L 160 140 M 160 140 L 210 115 M 190 290 L 160 260 M 190 290 L 240 305 M 290 245 L 295 195" stroke="#7A7D81" stroke-width="4" stroke-linecap="round" />

  <!-- Orange Swoosh -->
  <path d="M 100 200 C 100 80, 190 40, 270 50 L 265 75 C 205 65, 125 100, 125 200 C 125 270, 160 320, 200 340 L 190 360 C 140 335, 100 280, 100 200 Z" fill="url(#orangeGrad)" />
  <polygon points="270,50 295,25 295,75" fill="url(#orangeGrad)" />

  <!-- Blue Swoosh -->
  <path d="M 290 200 C 290 280, 220 340, 140 360 L 145 335 C 215 320, 265 265, 265 200 C 265 150, 245 110, 210 85 L 225 65 C 265 95, 290 145, 290 200 Z" fill="url(#blueGrad)" />

  <!-- Center FN (using simple paths for more precise "FN" logo styling) -->
  <!-- F -->
  <path d="M 150 250 L 150 130 L 210 130 L 210 155 L 175 155 L 175 180 L 205 180 L 205 205 L 175 205 L 175 250 Z" fill="url(#orangeGrad)" />
  <!-- N -->
  <path d="M 220 250 L 220 150 L 245 150 L 270 210 L 270 150 L 295 150 L 295 250 L 270 250 L 245 190 L 245 250 Z" fill="url(#orangeGrad)" />

  <!-- Flexing Figure Overlap -->
  <!-- Head -->
  <circle cx="280" cy="115" r="16" fill="url(#orangeGrad)" />
  <!-- Body/Arm -->
  <path d="M 245 145 C 260 135, 280 135, 295 155 L 320 135 C 295 105, 255 105, 225 135 Z" fill="url(#orangeGrad)" />
  <path d="M 245 145 L 260 185 L 285 245 L 305 210 Z" fill="url(#orangeGrad)" />

  <!-- Nodes Group -->
  <g fill="#7A7D81" stroke="#fff" stroke-width="4">
    <!-- ERP Node -->
    <circle cx="160" cy="140" r="26" />
    <text x="160" y="145" font-family="'Arial', sans-serif" font-weight="bold" font-size="14" fill="#fff" text-anchor="middle" stroke="none">erp</text>
    
    <!-- Data Node -->
    <circle cx="190" cy="290" r="26" />
    <text x="190" y="295" font-family="'Arial', sans-serif" font-weight="bold" font-size="14" fill="#fff" text-anchor="middle" stroke="none">data</text>
    
    <!-- Call Node -->
    <circle cx="290" cy="245" r="26" />
    <text x="290" y="250" font-family="'Arial', sans-serif" font-weight="bold" font-size="14" fill="#fff" text-anchor="middle" stroke="none">call</text>

    <!-- Additional smaller nodes -->
    <circle cx="140" cy="180" r="10" fill="url(#orangeGrad)" stroke="none" />
    <circle cx="210" cy="115" r="10" fill="url(#orangeGrad)" stroke="none" />
    <circle cx="295" cy="195" r="10" fill="url(#orangeGrad)" stroke="none" />
    <circle cx="240" cy="305" r="10" fill="url(#orangeGrad)" stroke="none" />
  </g>
</svg>